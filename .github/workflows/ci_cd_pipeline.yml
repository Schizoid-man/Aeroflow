name: Air Quality ML Pipeline CI/CD

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  lint_and_test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Airflow is run via Docker Compose, not needed for CI unit tests.
          python -c "from pathlib import Path; p=Path('requirements.txt'); lines=p.read_text(encoding='utf-8').splitlines(); kept=[ln for ln in lines if not ln.lstrip().startswith('apache-airflow==')]; Path('requirements-ci.txt').write_text('\n'.join(kept)+'\n', encoding='utf-8')"
          echo "--- requirements-ci.txt ---"
          cat requirements-ci.txt
          pip install -r requirements-ci.txt

      # Step 4: Run flake8 linting on core pipeline modules
      - name: Lint (flake8)
        run: |
          flake8 pipeline forecasting

      # Step 5: Run pytest with coverage
      - name: Test (pytest + coverage)
        run: |
          pytest -q --cov=pipeline --cov=forecasting --cov-report=xml

      # Step 6: Upload coverage report for academic documentation
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  validate_pipeline:
    name: Validate Pipeline Scripts
    runs-on: ubuntu-latest
    needs: lint_and_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -c "from pathlib import Path; p=Path('requirements.txt'); lines=p.read_text(encoding='utf-8').splitlines(); kept=[ln for ln in lines if not ln.lstrip().startswith('apache-airflow==')]; Path('requirements-ci.txt').write_text('\n'.join(kept)+'\n', encoding='utf-8')"
          echo "--- requirements-ci.txt ---"
          cat requirements-ci.txt
          pip install -r requirements-ci.txt

      # Dry-run extraction: mock API calls by skipping OpenAQ network fetches.
      - name: Validate extraction (dry-run)
        run: |
          python pipeline/extract.py --dry-run --out datasets/ci_extracted.csv

      # Transform on sample data and validate output columns.
      - name: Validate transformation
        run: |
          python pipeline/transform.py --input datasets/sample_aqi_india.csv --output datasets/ci_transformed.csv
          python -c "import pandas as pd; df=pd.read_csv('datasets/ci_transformed.csv'); expected={'aqi','city','date','aqi_category','hour_of_day','day_of_week','rolling_avg_pm25_7d','pm2_5_norm'}; missing=expected-set(df.columns); assert not missing, f'Missing columns: {sorted(missing)}'; assert len(df)>0"

  deploy_etl:
    name: Deploy ETL (Simulated)
    runs-on: ubuntu-latest
    needs: validate_pipeline
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulate deployment
        run: |
          echo "ETL scripts validated and deployed"

      # In a real deployment, this job could:
      # 1) Trigger Airflow DAG via Airflow REST API (POST /api/v1/dags/<dag_id>/dagRuns)
      # 2) Or copy updated orchestration/pipeline/forecasting code to a remote Airflow server via SSH/SCP
      # 3) Or build and push a Docker image containing the updated pipeline.
