name: Smart Building IoT Pipeline CI/CD

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  lint_and_test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -c "
          from pathlib import Path
          lines = Path('requirements.txt').read_text().splitlines()
          kept = [l for l in lines if not l.lstrip().startswith('apache-airflow==')]
          Path('requirements-ci.txt').write_text('\n'.join(kept) + '\n')
          "
          pip install -r requirements-ci.txt

      - name: Lint (flake8)
        run: |
          flake8 pipeline forecasting iot

      - name: Test (pytest + coverage)
        run: |
          pytest -q --cov=pipeline --cov=forecasting --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  validate_pipeline:
    name: Validate Pipeline Scripts
    runs-on: ubuntu-latest
    needs: lint_and_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -c "
          from pathlib import Path
          lines = Path('requirements.txt').read_text().splitlines()
          kept = [l for l in lines if not l.lstrip().startswith('apache-airflow==')]
          Path('requirements-ci.txt').write_text('\n'.join(kept) + '\n')
          "
          pip install -r requirements-ci.txt

      - name: Validate extraction (CSV fallback)
        run: |
          python pipeline/extract.py --csv-fallback --out datasets/ci_extracted.csv

      - name: Validate transformation
        run: |
          python pipeline/transform.py \
            --input datasets/sample_building_sensors.csv \
            --output datasets/ci_transformed.csv
          python -c "
          import pandas as pd
          df = pd.read_csv('datasets/ci_transformed.csv')
          expected = {'zone_id', 'energy_kw', 'hour_of_day', 'day_of_week',
                      'is_business_hours', 'rolling_avg_energy_7d', 'temperature_norm'}
          missing = expected - set(df.columns)
          assert not missing, f'Missing columns: {sorted(missing)}'
          assert len(df) > 0, 'Output is empty'
          print(f'Validation passed: {len(df)} rows, {len(df.columns)} columns')
          "

  deploy_etl:
    name: Deploy ETL (Simulated)
    runs-on: ubuntu-latest
    needs: validate_pipeline
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulate deployment
        run: |
          echo "IoT pipeline scripts validated and deployed"
