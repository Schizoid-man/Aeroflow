[pytest]
# Keep test discovery focused on project code.
# Airflow creates Windows-unfriendly files under logs/ (e.g. logs/scheduler/latest)
# that can crash pytest collection.
testpaths = quality_assurance
norecursedirs =
    .git
    .venv
    venv
    logs
    reports
    datasets
    forecasting/model
    **/__pycache__
addopts = -ra
